<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Bildigenkänningsmodell</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

#name{
position:absolute;
top:10px;
right:20px;
font-weight:bold;
}

#status{
margin:20px auto;
padding:10px;
width:300px;
border-radius:8px;
font-weight:bold;
}

.loading{background:#ffeaa7;}
.success{background:#b8f5b1;}
.error{background:#ffb3b3;}

img{
max-width:300px;
margin-top:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="name">Elliot NA24C</div>

<h1>Bildigenkänningsmodell</h1>

<div id="status" class="loading">Laddar modell...</div>

<input type="file" id="imageInput" accept="image/*">

<br>

<img id="preview">

<br>

<button onclick="predict()">Analysera bild</button>

<div id="result"></div>

<script>

let model;

async function loadModel(){

try{

const modelPath = window.location.origin + window.location.pathname.replace("index.html","") + "tfjs_model/model.json";

console.log("Loading model from:", modelPath);

model = await tf.loadLayersModel(modelPath);

document.getElementById("status").innerText="✅ Modell laddad!";
document.getElementById("status").className="success";

}catch(error){

document.getElementById("status").innerText="❌ Kunde inte ladda modellen";
document.getElementById("status").className="error";

console.error("MODEL ERROR:", error);

}

}

loadModel();



document.getElementById("imageInput").addEventListener("change",function(event){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload=function(e){

document.getElementById("preview").src = e.target.result;

}

reader.readAsDataURL(file);

});



async function predict(){

if(!model){
alert("Modellen är inte laddad ännu!");
return;
}

const img=document.getElementById("preview");

let tensor=tf.browser.fromPixels(img)
.resizeNearestNeighbor([224,224])
.toFloat()
.div(255)
.expandDims();

let prediction=model.predict(tensor);

let data=await prediction.data();

let max=Math.max(...data);
let index=data.indexOf(max);

document.getElementById("result").innerHTML=
"Klass: "+index+"<br>Säkerhet: "+(max*100).toFixed(2)+"%";

}

</script>

</body>
</html>
