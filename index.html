<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Bildigenkänningsmodell</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

#name{
position:absolute;
top:10px;
right:20px;
font-weight:bold;
}

#status{
margin:20px auto;
padding:12px;
width:320px;
border-radius:8px;
font-weight:bold;
}

.loading{
background:#ffeaa7;
}

.error{
background:#fab1a0;
}

.success{
background:#b8f5b1;
}

img{
max-width:300px;
margin-top:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:15px;
}

</style>
</head>

<body>

<div id="name">Elliot NA24C</div>

<h1>Bildigenkänningsmodell</h1>

<div id="status" class="loading">
Laddar modell...
</div>

<input type="file" id="imageInput" accept="image/*">
<br>

<img id="preview">

<br>

<button onclick="analyzeImage()">Analysera bild</button>

<div id="result"></div>


<script>

let model;

async function loadModel(){

try{

model = await tf.loadLayersModel("./tfjs_model/model.json");

document.getElementById("status").innerText = "✅ Modell laddad!";
document.getElementById("status").className = "success";

console.log("Model loaded successfully");

}catch(error){

document.getElementById("status").innerText = "❌ Kunde inte ladda modellen";
document.getElementById("status").className = "error";

console.error("Model loading error:", error);

}

}

loadModel();



document.getElementById("imageInput").addEventListener("change", function(event){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

const img = document.getElementById("preview");
img.src = e.target.result;

}

reader.readAsDataURL(file);

});



async function analyzeImage(){

if(!model){
alert("Modellen är inte laddad ännu!");
return;
}

const img = document.getElementById("preview");

let tensor = tf.browser.fromPixels(img)
.resizeNearestNeighbor([224,224])
.toFloat()
.div(255)
.expandDims();

let prediction = model.predict(tensor);

let data = await prediction.data();

let max = Math.max(...data);
let index = data.indexOf(max);

document.getElementById("result").innerHTML =
"<h3>Resultat</h3>Klass: "+index+"<br>Säkerhet: "+(max*100).toFixed(2)+"%";

}

</script>

</body>
</html>
